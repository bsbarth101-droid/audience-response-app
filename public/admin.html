<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin – Audience Response</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #f1f5f9; }

  /* ── LOGIN ── */
  #login-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100vh; gap: 16px;
  }
  #login-screen h1 { font-size: 1.8rem; color: #93c5fd; }
  #login-screen input {
    padding: 12px 18px; border-radius: 10px; border: 2px solid #334155;
    background: #1e293b; color: #f1f5f9; font-size: 1rem; width: 260px; outline: none;
  }
  #login-screen input:focus { border-color: #3b82f6; }
  #login-screen button {
    padding: 12px 32px; background: #2563eb; color: #fff;
    border: none; border-radius: 10px; font-size: 1rem; cursor: pointer;
  }
  #login-screen button:hover { background: #1d4ed8; }
  #login-error { color: #f87171; font-size: 0.9rem; }

  /* ── ADMIN LAYOUT ── */
  #admin-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
  }

  /* HEADER */
  #top-bar {
    background: #1e293b;
    border-bottom: 1px solid #334155;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #top-bar h1 { font-size: 1.1rem; color: #93c5fd; }
  #live-badge {
    display: none; align-items: center; gap: 6px;
    background: #14532d; color: #4ade80; padding: 4px 12px;
    border-radius: 999px; font-size: 0.78rem; font-weight: 700;
  }
  #live-badge .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80; animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* SETUP PANEL — shown before session starts */
  #setup-panel {
    background: #1e293b;
    border-bottom: 1px solid #334155;
    padding: 16px 20px;
    flex-shrink: 0;
    overflow-y: auto;
    max-height: 55vh;
  }
  #setup-panel.hidden { display: none; }

  .setup-row { display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; }
  .setup-field { display: flex; flex-direction: column; gap: 4px; }
  .setup-field label { font-size: 0.8rem; color: #94a3b8; }
  .setup-field input, .setup-field select {
    padding: 7px 10px; border-radius: 7px; border: 1.5px solid #334155;
    background: #0f172a; color: #f1f5f9; font-size: 0.9rem; outline: none;
  }
  .setup-field input:focus, .setup-field select:focus { border-color: #3b82f6; }
  .setup-field input[type="number"] { width: 80px; }

  #questions-setup { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  .q-row {
    background: #0f172a; border-radius: 10px; padding: 10px 14px;
    border: 1px solid #1e3a5f; display: flex; flex-direction: column; gap: 6px; min-width: 180px;
  }
  .q-title { font-size: 0.8rem; color: #60a5fa; font-weight: 600; }
  .q-row label { font-size: 0.75rem; color: #94a3b8; }
  .q-row input {
    padding: 5px 8px; border-radius: 6px; border: 1.5px solid #334155;
    background: #1e293b; color: #f1f5f9; font-size: 0.82rem; outline: none; width: 100%;
  }
  .q-row input:focus { border-color: #3b82f6; }

  /* CONTROL BAR — shown during session */
  #control-bar {
    background: #1e293b;
    border-bottom: 1px solid #334155;
    padding: 10px 20px;
    display: none;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  #q-nav { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-nav-btn {
    padding: 6px 12px; border-radius: 7px; border: 2px solid #334155;
    background: #0f172a; color: #94a3b8; cursor: pointer; font-size: 0.82rem; transition: all 0.15s;
  }
  .q-nav-btn:hover { border-color: #3b82f6; color: #93c5fd; }
  .q-nav-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; font-weight: 700; }
  .divider { width: 1px; height: 28px; background: #334155; }

  /* CHART AREA — always fills remaining space */
  #chart-area {
    flex: 1;
    min-height: 0;
    padding: 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #chart-title { font-size: 1.2rem; font-weight: 700; color: #e2e8f0; flex-shrink: 0; }
  #vote-count { font-size: 0.85rem; color: #64748b; flex-shrink: 0; }
  #chart-wrap { flex: 1; min-height: 0; position: relative; }
  #chart-wrap canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }

  /* QR strip at bottom of chart area */
  #qr-strip {
    display: flex; align-items: center; gap: 16px;
    flex-shrink: 0; padding-top: 8px; border-top: 1px solid #1e293b;
  }
  #qr-img { width: 64px; height: 64px; border-radius: 6px; border: 2px solid #1e3a5f; display: none; }
  #respondent-url { font-size: 0.75rem; color: #475569; word-break: break-all; }

  /* BUTTONS */
  .btn {
    padding: 8px 16px; border-radius: 8px; border: none;
    font-size: 0.85rem; cursor: pointer; font-weight: 600;
    transition: background 0.15s, opacity 0.15s; white-space: nowrap;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-success { background: #16a34a; color: #fff; }
  .btn-success:hover:not(:disabled) { background: #15803d; }
  .btn-danger  { background: #dc2626; color: #fff; }
  .btn-danger:hover:not(:disabled)  { background: #b91c1c; }
  .btn-ghost   { background: #334155; color: #cbd5e1; }
  .btn-ghost:hover:not(:disabled)   { background: #475569; }

  #error-msg { color: #f87171; font-size: 0.82rem; }
  #session-status { font-size: 0.82rem; color: #64748b; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>🎛️ Admin Panel</h1>
  <input type="password" id="pwd-input" placeholder="Admin password" autofocus/>
  <button onclick="doLogin()">Login</button>
  <div id="login-error"></div>
</div>

<!-- ADMIN -->
<div id="admin-screen">

  <!-- TOP BAR -->
  <div id="top-bar">
    <h1>🎛️ Audience Response – Admin</h1>
    <div style="display:flex;align-items:center;gap:12px;">
      <div id="session-status">No active session</div>
      <div id="live-badge"><span class="dot"></span> LIVE</div>
    </div>
  </div>

  <!-- SETUP PANEL (before session) -->
  <div id="setup-panel">
    <div class="setup-row">
      <div class="setup-field">
        <label>Number of Questions</label>
        <input type="number" id="num-questions" min="1" max="20" value="1" onchange="buildQSetup()"/>
      </div>
      <div class="setup-field">
        <label>Allow answer changes?</label>
        <select id="allow-changes">
          <option value="no">No – final submission</option>
          <option value="yes">Yes – can change answer</option>
        </select>
      </div>
      <div class="setup-field" style="justify-content:flex-end;padding-top:18px;">
        <button class="btn btn-success" id="start-btn" onclick="startSession()">▶ Start Session</button>
      </div>
      <div class="setup-field" style="justify-content:flex-end;padding-top:18px;">
        <div id="error-msg"></div>
      </div>
    </div>
    <div id="questions-setup"></div>
  </div>

  <!-- CONTROL BAR (during session) -->
  <div id="control-bar">
    <button class="btn btn-danger btn-sm" onclick="endSession()">■ End Session</button>
    <div class="divider"></div>
    <div id="q-nav"></div>
    <div class="divider"></div>
    <button class="btn btn-ghost" style="padding:6px 12px;font-size:0.82rem;" onclick="toggleLive()">⏸ Pause</button>
    <button class="btn btn-ghost" style="padding:6px 12px;font-size:0.82rem;" onclick="manualRefresh()">↻ Refresh</button>
  </div>

  <!-- CHART — always visible, fills all remaining space -->
  <div id="chart-area">
    <div id="chart-title">Waiting for session…</div>
    <div id="vote-count"></div>
    <div id="chart-wrap">
      <canvas id="myChart"></canvas>
    </div>
    <div id="qr-strip">
      <img id="qr-img" src="" alt="QR"/>
      <div>
        <div style="font-size:0.7rem;color:#475569;margin-bottom:2px;">RESPONDENT URL</div>
        <div id="respondent-url">Loading…</div>
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:0.75rem;margin-top:6px;" onclick="downloadQR()">⬇ Download QR</button>
      </div>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let adminPassword = '';
let socket = null;
let chart = null;
let liveMode = true;
let latestResults = null;

function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  }).then(r => r.json()).then(data => {
    if (data.ok) {
      adminPassword = pwd;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'flex';
      initAdmin();
    } else {
      document.getElementById('login-error').textContent = 'Wrong password. Try again.';
    }
  });
}
document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function initAdmin() {
  buildQSetup();
  loadQR();
  initChart();
  connectSocket();
}

function buildQSetup() {
  const n = parseInt(document.getElementById('num-questions').value) || 1;
  const container = document.getElementById('questions-setup');
  const existing = [];
  container.querySelectorAll('.q-row').forEach(row => {
    existing.push({
      label: row.querySelector('.q-label-input')?.value || '',
      optionCount: row.querySelector('.q-opt-input')?.value || ''
    });
  });
  container.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const prev = existing[i] || {};
    const row = document.createElement('div');
    row.className = 'q-row';
    row.innerHTML = `
      <div class="q-title">Question ${i + 1}</div>
      <label>Label (shown on graph)</label>
      <input class="q-label-input" type="text" value="${prev.label || `Question ${i + 1}`}" placeholder="Question ${i + 1}"/>
      <label>Options (1–10, blank = 10)</label>
      <input class="q-opt-input" type="number" min="1" max="10" value="${prev.optionCount || ''}" placeholder="10"/>
    `;
    container.appendChild(row);
  }
}

function connectSocket() {
  socket = io();
  socket.on('session_state', (state) => {
    const isActive = state.active;
    document.getElementById('session-status').textContent = isActive
      ? `Live – Q${state.currentQuestion + 1} of ${state.totalQuestions}`
      : 'No active session';
    document.getElementById('live-badge').style.display = isActive ? 'inline-flex' : 'none';
    document.getElementById('setup-panel').style.display = isActive ? 'none' : 'block';
    document.getElementById('control-bar').style.display = isActive ? 'flex' : 'none';
    if (isActive) {
      buildQNav(state.totalQuestions, state.currentQuestion);
      document.getElementById('chart-title').textContent = state.currentLabel || `Question ${state.currentQuestion + 1}`;
    } else {
      document.getElementById('chart-title').textContent = 'No active session';
      document.getElementById('vote-count').textContent = '';
    }
  });
  socket.on('results_update', (data) => {
    latestResults = data;
    if (liveMode) renderChart(data);
  });
}

function startSession() {
  const rows = document.querySelectorAll('.q-row');
  const questions = Array.from(rows).map(row => ({
    label: row.querySelector('.q-label-input').value || 'Question',
    optionCount: parseInt(row.querySelector('.q-opt-input').value) || 10
  }));
  const allowChanges = document.getElementById('allow-changes').value === 'yes';
  socket.emit('admin_start', { password: adminPassword, questions, allowChanges });
}

function endSession() {
  if (!confirm('End the current session?')) return;
  socket.emit('admin_end', { password: adminPassword });
}

function gotoQuestion(qIndex) {
  socket.emit('admin_goto', { password: adminPassword, qIndex });
}

function manualRefresh() {
  socket.emit('admin_refresh', { password: adminPassword });
}

function toggleLive() {
  liveMode = !liveMode;
  const btn = document.querySelector('[onclick="toggleLive()"]');
  btn.textContent = liveMode ? '⏸ Pause' : '▶ Resume';
  if (liveMode && latestResults) renderChart(latestResults);
}

function buildQNav(total, active) {
  const nav = document.getElementById('q-nav');
  nav.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const btn = document.createElement('button');
    btn.className = 'q-nav-btn' + (i === active ? ' active' : '');
    btn.textContent = `Q${i + 1}`;
    btn.onclick = () => gotoQuestion(i);
    nav.appendChild(btn);
  }
}

function initChart() {
  const ctx = document.getElementById('myChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: [],
      datasets: [{
        label: 'Votes',
        data: [],
        backgroundColor: 'rgba(37, 99, 235, 0.75)',
        borderColor: 'rgba(59, 130, 246, 1)',
        borderWidth: 2,
        borderRadius: 8,
        hoverBackgroundColor: 'rgba(59, 130, 246, 0.9)'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 400 },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.parsed.y} vote${ctx.parsed.y !== 1 ? 's' : ''}`
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { color: '#94a3b8', stepSize: 1, precision: 0 },
          grid: { color: '#1e293b' }
        },
        x: {
          ticks: { color: '#94a3b8', font: { size: 16, weight: '700' } },
          grid: { display: false }
        }
      }
    }
  });
}

function renderChart(data) {
  const { results, optionCount, totalVoters, label, qIndex } = data;
  const labels = [], values = [];
  for (let i = 0; i < optionCount; i++) {
    labels.push(String(i));
    values.push(results[i] || 0);
  }
  chart.data.labels = labels;
  chart.data.datasets[0].data = values;
  chart.update();
  document.getElementById('chart-title').textContent = label || `Question ${qIndex + 1}`;
  document.getElementById('vote-count').textContent =
    `${totalVoters} respondent${totalVoters !== 1 ? 's' : ''} connected`;
  document.querySelectorAll('.q-nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === qIndex);
  });
}

function loadQR() {
  const base = window.location.origin;
  document.getElementById('respondent-url').textContent = base;
  fetch(`/api/qr?url=${encodeURIComponent(base)}`)
    .then(r => r.json()).then(d => {
      const img = document.getElementById('qr-img');
      img.src = d.qr;
      img.style.display = 'block';
    });
}

function downloadQR() {
  const img = document.getElementById('qr-img');
  if (!img.src) return;
  const a = document.createElement('a');
  a.href = img.src;
  a.download = 'audience-response-qr.png';
  a.click();
}
</script>
</body>
</html>
